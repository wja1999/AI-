name: Update A Stock Rank

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * 1-5"

permissions:
  contents: write

jobs:
  update-rank:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare yfinance pandas numpy

      - name: Run scanner
        run: |
          python a_stock_rank_scanner.py

      - name: Commit CSV
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add a_stock_rank.csv
          git commit -m "Update A stock rank CSV" || echo "No changes to commit"
          git push
